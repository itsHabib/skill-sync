version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt           # standard formatting
    - goimports       # import ordering

linters:
  enable:
    # Bugs & correctness
    - errcheck        # unchecked errors
    - govet           # go vet on steroids
    - staticcheck     # comprehensive static analysis
    - ineffassign     # detects unused assignments
    - unused          # detects unused code

    # Style & consistency
    - revive          # extensible linter (replaces golint)
    - misspell        # spelling mistakes in comments/strings
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters
    - whitespace      # unnecessary leading/trailing whitespace

    # Complexity & maintainability
    - gocyclo         # cyclomatic complexity
    - gocognit        # cognitive complexity
    - nestif          # deeply nested ifs
    - funlen          # long functions

    # Performance
    - prealloc        # preallocate slices
    - copyloopvar     # loop variable capture bugs

    # Error handling
    - errorlint       # error wrapping best practices
    - nilerr          # returning nil after checking err != nil

  settings:
    errcheck:
      # CLI output to stdout/stderr — standard practice not to check these.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    nestif:
      min-complexity: 5
    funlen:
      lines: 80
      statements: 50
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: unused-parameter

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    # Test files get relaxed rules.
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - gocognit
        - unparam
        - errcheck
