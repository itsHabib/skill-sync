phase: "validation"

goal: >
  Create an end-to-end test plan, smoke tests, and edge case documentation to
  verify skill-sync works against real provider directories.

system_context: |
  ## Project: skill-sync
  A Go CLI that syncs AI assistant skills from a primary provider to others with drift detection.

  ## What exists from Phases 1-2
  - Full CLI with commands: init, sync, status, diff
  - 4 providers: Claude Code, Copilot, Gemini CLI, Factory AI Droid
  - Sync engine: reads source, writes to targets
  - Diff engine: detects drift, produces unified diffs
  - Config: .skill-sync.yaml with source, targets, optional skill filter
  - Unit tests for providers and engines

  ## What we're building in this phase
  This phase is about validation — making sure the tool actually works end-to-end.
  We're NOT writing exhaustive unit tests (those exist from Phases 1-2).

  Instead:
  1. A **test plan** document that a human can follow to manually validate the tool
  2. A **smoke test** in Go that sets up temp directories, seeds skills, and runs
     the full flow (sync, status, diff) programmatically
  3. An **edge case document** cataloging tricky scenarios and expected behavior

  ## Key validation scenarios
  - Fresh init: run `skill-sync init`, verify .skill-sync.yaml created correctly
  - First sync: source has skills, targets are empty -> all skills copied
  - Re-sync: source unchanged, targets populated -> no-op (all in-sync)
  - Drift: modify a skill in target -> status shows Modified, diff shows changes
  - New skill: add a skill to source -> status shows MissingInTarget, sync copies it
  - Deleted skill: remove a skill from source -> status shows ExtraInTarget
  - Dry run: sync --dry-run should show what would happen without writing
  - Skill filter: sync --skill foo should only sync "foo"
  - Format translation: a Claude skill with $ARGUMENTS synced to Copilot —
    verify the target format is valid for that provider

  ## Important: this phase produces docs + one smoke test, not a full test suite
  Keep the smoke test focused on the happy path. The test plan and edge case docs
  are for human validation. Don't over-engineer.

dependencies:
  - PROJECT.md
  - docs/core/content/
  - docs/providers-and-commands/content/

plans_dir: docs/validation/plans
content_dir: docs/validation/content

teammates:
  - role: "QE Lead"
    doc: qe-lead.md
    focus: |
      Write a comprehensive but practical end-to-end test plan.

      **docs/validation/content/test-plan.md**
      Write a test plan document with:

      1. **Setup instructions** — how to build the binary, set up test directories
      2. **Test scenarios** — numbered list of manual test cases:
         - Each scenario: preconditions, steps, expected outcome
         - Cover: init, first sync, re-sync, drift detection, diff output,
           dry-run, skill filter, cross-provider format translation
      3. **Provider-specific checks** — for each provider, verify:
         - Skills land in the correct directory
         - File format matches provider conventions
         - Metadata (description, arguments) translated correctly
      4. **CI integration** — how to use `skill-sync status` in CI to fail on drift
      5. **Pass/fail criteria** — what constitutes a passing validation

      Keep it practical — something a developer can run through in 15-20 minutes.
      Don't write a 50-page test doc, write something people will actually use.

  - role: "Smoke Test Dev"
    doc: smoke-test.md
    focus: |
      Write a Go integration test that exercises the full flow.

      **tests/smoke_test.go**
      A single test function (or small set) that:
      1. Creates temp directories for source (Claude) and targets (Copilot, Gemini)
      2. Seeds the source dir with 2-3 sample skill .md files
      3. Creates a .skill-sync.yaml config pointing to temp dirs
      4. Runs SyncEngine.Sync() programmatically
      5. Verifies target dirs contain translated skill files
      6. Modifies one target skill file
      7. Runs DiffEngine.Status()
      8. Verifies drift is detected (Modified status)
      9. Runs DiffEngine.Diff() and verifies diff output is non-empty
      10. Cleans up (t.TempDir handles this)

      **tests/testdata/**
      Create 2-3 sample skill files that cover:
      - A simple skill (just markdown content)
      - A skill with a description header
      - A skill with $ARGUMENTS placeholders

      Keep it simple — this is a smoke test, not a full integration suite.
      Use t.TempDir() and the internal packages directly (not exec'ing the binary).

  - role: "Edge Case Analyst"
    doc: edge-cases.md
    focus: |
      Document edge cases, tricky scenarios, and expected behavior.

      **docs/validation/content/edge-cases.md**
      A document organized by category:

      **File system edge cases:**
      - Source dir doesn't exist (provider not installed)
      - Target dir doesn't exist (should it be created?)
      - Permission errors (read-only target dir)
      - Symlinks in skill directories
      - Skill files with spaces or special chars in names

      **Content edge cases:**
      - Empty skill files
      - Very large skill files (>1MB)
      - Skills with binary content or non-UTF8
      - Skills with identical names but different content across providers
      - Skill names that are valid in one provider but invalid in another

      **Sync edge cases:**
      - Source and target are the same provider
      - Config with no targets
      - Config with invalid provider name
      - Running sync twice in a row (idempotency)
      - Concurrent syncs (file locking?)

      **Format translation edge cases:**
      - Claude $ARGUMENTS -> how does this translate to Copilot/Gemini/Factory?
      - Provider-specific features that have no equivalent in other providers
      - YAML frontmatter handling across providers

      For each edge case: describe the scenario, state the expected behavior,
      and note whether it's handled, needs handling, or is explicitly out of scope.
